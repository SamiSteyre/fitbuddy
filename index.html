<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FitBuddy AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Correction Mobile : Hauteur dynamique (dvh) et zones de sécurité */
        html, body { 
            background-color: #000; margin: 0; padding: 0; 
            height: 100dvh; width: 100vw; overflow: hidden; position: fixed; 
        }

        #app-container {
            height: 100dvh; display: flex; flex-direction: column; background-color: #000;
            padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
        }

        /* Design des messages : Violet pour l'utilisateur */
        .msg-user { 
            background: linear-gradient(135deg, #6b21a8, #4c1d95) !important; 
            border-radius: 20px 20px 2px 20px !important; 
            align-self: flex-end;
            margin-left: auto;
            color: white;
            font-weight: 500;
        }

        .msg-agent { 
            background: #1a1a1a; 
            border: 1px solid #22d3ee; 
            border-radius: 20px 20px 20px 2px; 
            align-self: flex-start;
            color: #e5e5e5;
        }
        
        #chat::-webkit-scrollbar { width: 0; }
        .purchased { opacity: 0.3; filter: grayscale(1); transform: scale(0.95); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background: rgba(239, 68, 68, 0.3) !important; }
    </style>
</head>
<body>

    <div id="app-container">
        <header class="flex-none h-14 border-b border-white/10 flex justify-between items-center px-4 bg-black">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                <h1 class="text-sm font-black uppercase text-cyan-400 tracking-tighter">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-none h-[30dvh] bg-black relative border-b border-white/10">
                <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                    <source src="agent-avatar.mp4" type="video/mp4">
                </video>
            </div>

            <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 flex flex-col">
                <div class="msg-agent p-4 max-w-[90%] shadow-lg">
                    <p class="text-[8px] text-cyan-400 uppercase font-black mb-1">System</p>
                    <p id="system-status" class="text-xs">Prêt.</p>
                </div>
            </div>
        </main>

        <footer class="flex-none p-3 bg-black border-t border-white/10">
            <div class="flex items-center gap-2 max-w-4xl mx-auto">
                <button id="micBtn" onclick="toggleMic()" class="flex-none w-12 h-12 bg-white/5 border border-white/20 rounded-xl flex items-center justify-center">
                    <i id="micIcon" data-lucide="mic" class="w-5 h-5 text-cyan-400"></i>
                </button>
                <div class="relative flex-1">
                    <input type="text" id="userInput" class="w-full bg-white/5 border border-white/10 rounded-2xl p-3.5 pr-12 focus:outline-none focus:border-cyan-500 text-sm text-white" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
                    <button onclick="envoyerMessage()" class="absolute right-2 top-2 bottom-2 px-3 bg-cyan-600 rounded-xl shadow-lg">
                        <i data-lucide="send-horizontal" class="w-4 h-4 text-white"></i>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Déclaration unique de userEmail pour éviter SyntaxError [cite: image_6b1b53
