<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <!-- Correction du warning mobile -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitBuddy">
    <meta name="theme-color" content="#050505">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json?v=3">
    <title>FitBuddy AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Fond noir pur pour supprimer tout effet de ghosting/transparence */
        body { background-color: #000; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        /* Container principal opaque */
        .main-card { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 10; }
        
        .message-user { background: linear-gradient(135deg, #6b21a8, #4c1d95); margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .message-agent { background: #1a1a1a; margin-right: auto; border-radius: 15px 15px 15px 2px; border: 1px solid #22d3ee; }
        
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .purchased { opacity: 0.35; filter: grayscale(1); transform: scale(0.95); transition: all 0.3s ease; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="main-container" class="w-full h-full md:max-w-6xl md:h-[90vh] md:rounded-3xl main-card overflow-hidden flex flex-col shadow-2xl">
        
        <!-- Header -->
        <div class="flex-none p-3 border-b border-white/10 flex justify-between items-center bg-black">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-base font-bold uppercase text-cyan-400 tracking-tighter">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </div>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <!-- Zone Vidéo -->
            <div class="flex-none h-48 md:h-full md:w-1/2 bg-black relative border-b border-white/10 md:border-b-0 md:border-r">
                <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                    <source src="agent-avatar.mp4" type="video/mp4">
                </video>
            </div>

            <!-- Zone Chat / Shopping -->
            <div class="flex-1 flex flex-col overflow-hidden bg-black">
                <div id="chat" class="flex-1 overflow-y-auto space-y-4 p-4">
                    <!-- Message Initial -->
                    <div id="init-msg" class="message-agent p-4 max-w-[90%] shadow-xl">
                        <p class="text-[8px] text-cyan-400 uppercase tracking-widest mb-1 font-bold">System</p>
                        <p id="system-status" class="text-xs">Prêt.</p>
                    </div>
                </div>

                <!-- Input Bar -->
                <div class="flex-none p-3 bg-black border-t border-white/10">
                    <div class="flex items-center gap-2">
                        <button id="micBtn" onclick="toggleMic()" class="flex-none w-12 h-12 bg-white/5 border border-white/20 rounded-xl flex items-center justify-center transition-all">
                            <i id="micIcon" data-lucide="mic" class="w-5 h-5 text-cyan-400"></i>
                        </button>
                        <div class="relative flex-1">
                            <input type="text" id="userInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 pr-12 focus:outline-none focus:border-cyan-500/50 text-sm" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
                            <button onclick="envoyerMessage()" class="absolute right-2 top-2 bottom-2 px-3 bg-cyan-600 rounded-lg">
                                <i data-lucide="send-horizontal" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIG ET VARIABLES (UNE SEULE DÉCLARATION ICI) ---
        let userEmail = localStorage.getItem('fitbuddy_email');
        const N8N_URL = "https://greedily-submarine-prance.ngrok-free.dev";
        const DEFAULT_IMAGE = "default-item.svg";
        const RAYONS = ["Frais", "Boulangerie & Viennoiserie", "Fruits & Légumes frais", "Boucherie & Volaille", "Poissonnerie", "Pâtes Riz & féculents", "Conserves de Légumes & Plats Cuisinés", "Conserves de Poisson", "Huiles Vinaigres Epices & Sauces", "Apéritif", "Petit-déjeuner", "Biscuits & Gâteaux", "Confiserie & Chocolat", "Confitures Miels & Pâtes à tartiner", "Aide à la pâtisserie", "Lait & Oeufs", "Produits laitiers", "Surgelés", "Boissons", "Hygiène", "Entretien de la maison", "Animalerie", "Loisirs", "Autres"];

        let currentList = [];
        let isListening = false;

        // --- 2. INITIALISATION ---
        window.addEventListener('load', () => { 
            lucide.createIcons();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js?v=3').catch(() => {});
            }
            checkAuth(); 
        });

        function checkAuth() {
            if (!userEmail) {
                userEmail = prompt("E-mail :");
                if (userEmail && userEmail.includes("@")) {
                    localStorage.setItem('fitbuddy_email', userEmail);
                } else { location.reload(); }
            }
            const status = document.getElementById('system-status');
            if(status) status.innerText = `Connecté : ${userEmail}`;
        }

        // --- 3. MICRO / RECONNAISSANCE VOCALE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = (SpeechRecognition) ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.lang = 'fr-FR';
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('mic-active');
                document.getElementById('micIcon').style.color = '#ef4444';
            };
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                setTimeout(envoyerMessage, 400);
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('mic-active');
                document.getElementById('micIcon').style.color = '';
            };
        }

        function toggleMic() {
            if (!recognition) return;
            if (!isListening) recognition.start(); else recognition.stop();
        }

        // --- 4. LOGIQUE SHOPPING ---
        function switchToShopping(data) {
            console.log("Passage en mode courses...");
            
            // Changement de la vidéo (Fix .load())
            const video = document.getElementById('agentVideo');
            if (video) {
                video.innerHTML = ""; 
                video.src = "agent-courses.mp4";
                video.load();
                video.play().catch(e => console.error("Erreur lecture vidéo :", e));
            }

            // Normalisation des datas
            let itemsArray = (Array.isArray(data)) ? data : (data.items || data.data || []);
            
            currentList = itemsArray.map((i, idx) => ({
                id: i.id || i.pageId || `idx-${idx}`,
                nom: (i.nom || i.item || i.produit || "Produit").trim(),
                quantite: i.quantite || i.quantity || "1",
                unite: i.unite || i.unit || "",
                rayon: (i.rayon || i.category || "Autres").trim(),
                isPurchased: false
            }));
            
            renderShopping();
        }

        function renderShopping() {
            const chat = document.getElementById('chat');
            chat.innerHTML = `<div id="shopping-content" class="p-2 pb-24 space-y-8 animate-in fade-in duration-500"></div>`;
            const content = document.getElementById('shopping-content');

            // Affichage par rayons
            RAYONS.forEach(rayon => {
                const items = currentList.filter(i => i.rayon === rayon && !i.isPurchased);
                if (items.length > 0) appendCategory(content, rayon, items);
            });

            // Affichage du Panier
            const purchased = currentList.filter(i => i.isPurchased);
            if (purchased.length > 0) appendCategory(content, "PANIER", purchased, true);
        }

        function appendCategory(container, title, items, isPurchasedSection = false) {
            const section = document.createElement('div');
            section.innerHTML = `
                <h2 class="text-[10px] font-black text-cyan-400/50 uppercase mb-4 pl-1 border-l-2 border-cyan-400/30">${title}</h2>
                <div class="grid grid-cols-3 gap-2 md:gap-4"></div>
            `;
            const grid = section.querySelector('.grid');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.onclick = () => togglePurchase(item.id);
                card.className = `relative aspect-[4/5] rounded-xl overflow-hidden border border-white/10 bg-black transition-all active:scale-95 ${isPurchasedSection ? 'purchased' : ''}`;
                
                // Nettoyage nom image (Gère Bœuf -> boeuf)
                const cleanName = item.nom.toLowerCase()
                    .replace(/[œŒ]/g, 'oe').replace(/[æÆ]/g, 'ae')
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                    .replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');

                const imageUrl = `images/produits/${cleanName}.jpg`;

                card.innerHTML = `
                    <img src="${imageUrl}" class="absolute inset-0 w-full h-full object-cover" onerror="this.onerror=null; this.src='${DEFAULT_IMAGE}';">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-transparent p-2 flex flex-col justify-end">
                        <p class="text-[9px] font-black uppercase text-white leading-tight drop-shadow-md">${item.nom}</p>
                        <p class="text-[8px] text-cyan-400 font-bold mt-0.5">${item.quantite} ${item.unite}</p>
                    </div>`;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }

        async function togglePurchase(id) {
            const item = currentList.find(i => i.id === id);
            if (!item) return;
            item.isPurchased = !item.isPurchased;
            renderShopping();
            try {
                await fetch(`${N8N_URL}/webhook/shopping-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: item.isPurchased ? "delete" : "add", pageId: item.id, produit: item.nom, email: userEmail })
                });
            } catch (e) { console.error("Erreur synchro:", e); }
        }

        // --- 5. CHAT ET ENVOI ---
        async function envoyerMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || !userEmail) return;
            
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message-user p-4 max-w-[90%] text-xs text-white shadow-lg animate-in slide-in-from-right-4">${message}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`${N8N_URL}/webhook/chat-agent`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ message: message, email: userEmail }) 
                });
                const resArray = await response.json();
                const res = Array.isArray(resArray) ? resArray[0] : resArray;
                
                if (res.output) { 
                    chat.innerHTML += `<div class="message-agent p-4 max-w-[90%] text-xs text-gray-200 border-l-2 border-cyan-400 animate-in slide-in-from-left-4">${res.output}</div>`; 
                }
                
                let action = res.action || (res.data && res.data.action) || "";
                if (action.includes("Shopping") || action.includes("switchToShopping")) {
                    switchToShopping(res.data || res);
                }
                
                if (res.audio_base64 && res.audio_base64 !== "empty") { 
                    new Audio("data:audio/mp3;base64," + res.audio_base64).play(); 
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { console.error("Erreur réseau:", e); }
        }
    </script>
</body>
</html>
