<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json?v=3">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=3');
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitBuddy">
    <meta name="theme-color" content="#050505">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitBuddy AI - Coach Vocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
        html { height: -webkit-fill-available; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .message-user { background: linear-gradient(135deg, #6b21a8, #4c1d95); margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .message-agent { background: rgba(30, 30, 30, 0.8); margin-right: auto; border-radius: 15px 15px 15px 2px; border: 1px solid #22d3ee; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .purchased { opacity: 0.35; filter: grayscale(1); transform: scale(0.95); transition: all 0.3s ease; }
        
        /* Animation pour le micro actif */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { 
            animation: pulse-red 1.5s infinite; 
            background-color: rgba(239, 68, 68, 0.2) !important; 
            border-color: #ef4444 !important; 
        }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="main-container" class="w-full max-w-6xl h-full md:h-[90vh] md:rounded-3xl glass overflow-hidden flex flex-col shadow-2xl">
        <div class="flex-none p-3 md:p-4 border-b border-white/10 flex justify-between items-center bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-base md:text-lg font-bold tracking-tighter uppercase text-cyan-400">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </div>

        <div class="flex-1 flex flex-col landscape:flex-row md:flex-row overflow-hidden">
            <div class="flex-none h-40 landscape:h-full landscape:w-1/3 md:h-full md:w-1/2 bg-black relative border-b landscape:border-b-0 landscape:border-r md:border-b-0 md:border-r border-white/10">
                <div class="video-container">
                    <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                        <source src="agent-avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden bg-gradient-to-b from-white/[0.02] to-transparent">
                <div id="chat" class="flex-1 overflow-y-auto space-y-4 relative">
                    <div class="message-agent m-4 p-4 max-w-[90%] shadow-xl">
                        <p class="text-[8px] text-cyan-400 uppercase tracking-widest mb-1 font-bold">System</p>
                        <p id="system-status" class="text-xs">Coach prêt. Je t'écoute.</p>
                    </div>
                </div>

                <div class="flex-none p-3 md:p-4 bg-black/40 border-t border-white/5">
                    <div class="relative flex items-center gap-2">
                        <button id="micBtn" onclick="toggleMic()" class="relative z-50 flex-none w-12 h-12 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center active:scale-95 transition-all group">
                            <i id="micIcon" data-lucide="mic" class="w-5 h-5 text-cyan-400 transition-colors"></i>
                        </button>
                        <div class="relative flex-1">
                            <input type="text" id="userInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 md:p-4 pr-14 focus:outline-none focus:border-cyan-500/50 text-sm" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
                            <button onclick="envoyerMessage()" class="absolute right-2 top-2 bottom-2 px-3 bg-cyan-600 rounded-lg shadow-lg">
                                <i data-lucide="send-horizontal" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => { 
            lucide.createIcons();
            checkAuth(); 
        });

        let userEmail = localStorage.getItem('fitbuddy_email');
        const N8N_URL = "https://greedily-submarine-prance.ngrok-free.dev";
        const DEFAULT_IMAGE = "default-item.svg";
        const RAYONS = ["Boulangerie & Viennoiserie", "Fruits & Légumes frais", "Boucherie & Volaille", "Poissonnerie", "Pâtes Riz & féculents", "Conserves de Légumes & Plats Cuisinés", "Conserves de Poisson", "Huiles Vinaigres Epices & Sauces", "Apéritif", "Petit-déjeuner", "Biscuits & Gâteaux", "Confiserie & Chocolat", "Confitures Miels & Pâtes à tartiner", "Aide à la pâtisserie", "Lait & Oeufs", "Produits laitiers", "Surgelés", "Boissons", "Hygiène", "Entretien de la maison", "Animalerie", "Loisirs", "Autres"];

        let isListening = false;
        let currentAudio = null;
        let currentList = [];

        // --- AUTHENTIFICATION ---
        function checkAuth() {
            if (!userEmail) {
                userEmail = prompt("Veuillez entrer votre e-mail pour accéder au coach :");
                if (userEmail && userEmail.includes("@")) {
                    localStorage.setItem('fitbuddy_email', userEmail);
                    document.getElementById('system-status').innerText = `Connecté : ${userEmail}`;
                } else {
                    alert("E-mail invalide.");
                    location.reload();
                }
            } else {
                document.getElementById('system-status').innerText = `Ravi de vous revoir !`;
            }
        }

        // --- RECONNAISSANCE VOCALE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                stopMicVisuals();
                setTimeout(envoyerMessage, 500);
            };

            recognition.onerror = () => stopMicVisuals();
            recognition.onend = () => stopMicVisuals();
        }

        function toggleMic() {
            const micBtn = document.getElementById('micBtn');
            const micIcon = document.getElementById('micIcon');

            if (!recognition) {
                alert("Micro non supporté sur ce navigateur.");
                return;
            }

            if (!isListening) {
                try {
                    recognition.start();
                    isListening = true;
                    // Forcer l'état actif (Rouge)
                    micBtn.classList.add('mic-active');
                    micIcon.classList.remove('text-cyan-400');
                    micIcon.classList.add('text-red-500');
                } catch (e) {
                    stopMicVisuals();
                }
            } else {
                recognition.stop();
            }
        }

        function stopMicVisuals() {
            isListening = false;
            const micBtn = document.getElementById('micBtn');
            const micIcon = document.getElementById('micIcon');
            
            // Retour à l'état repos (Cyan)
            micBtn.classList.remove('mic-active');
            micIcon.classList.remove('text-red-500');
            micIcon.classList.add('text-cyan-400');
        }

        // --- FONCTIONS SHOPPING ---
        function switchToShopping(items) {
            currentList = items.map(i => ({...i, isPurchased: false}));
            renderShopping();
        }

        function renderShopping(filterRayonName = "Tous les rayons") {
            const chat = document.getElementById('chat');
            chat.innerHTML = `
                <div class="sticky top-0 left-0 w-full bg-[#050505] border-b border-white/10 z-[60] shadow-2xl">
                    <div class="p-3 overflow-x-auto no-scrollbar flex gap-2 backdrop-blur-md bg-black/40">
                        <button onclick="renderShopping('Tous les rayons')" class="rayon-btn whitespace-nowrap px-4 py-1.5 rounded-full border ${filterRayonName === 'Tous les rayons' ? 'bg-cyan-500 text-black border-cyan-500' : 'border-cyan-500/30'} text-[9px] uppercase font-black transition-all">Tous les rayons</button>
                        ${RAYONS.map(r => `<button onclick="renderShopping('${r}')" class="rayon-btn whitespace-nowrap px-4 py-1.5 rounded-full border ${filterRayonName === r ? 'bg-cyan-500 text-black border-cyan-500' : 'border-cyan-500/30'} text-[9px] uppercase font-black transition-all">${r}</button>`).join('')}
                    </div>
                </div>
                <div id="shopping-content" class="p-4 pb-24 space-y-8"></div>
            `;
            const content = document.getElementById('shopping-content');
            if (filterRayonName === "Tous les rayons") {
                RAYONS.forEach(rayon => {
                    const items = currentList.filter(i => (i.rayon || i.category) === rayon && !i.isPurchased);
                    if (items.length > 0) appendCategory(content, rayon, items);
                });
            } else {
                const items = currentList.filter(i => (i.rayon || i.category) === filterRayonName && !i.isPurchased);
                if (items.length > 0) appendCategory(content, filterRayonName, items);
            }
            const purchasedItems = currentList.filter(i => i.isPurchased);
            if (purchasedItems.length > 0) appendCategory(content, "ACHETÉ (Panier)", purchasedItems, true);
        }

        function appendCategory(container, title, items, isPurchasedSection = false) {
            const section = document.createElement('div');
            section.innerHTML = `<h2 class="text-[10px] font-black text-cyan-400/50 uppercase tracking-[0.2em] mb-4 pl-1 border-l-2 border-cyan-400/30">${title}</h2><div class="grid grid-cols-3 gap-2 md:gap-4"></div>`;
            const grid = section.querySelector('.grid');
            items.forEach(item => {
                const nomProd = item.nom || item.item || "Produit";
                const qteProd = item.quantite || item.quantity || "1";
                const card = document.createElement('div');
                card.onclick = () => togglePurchase(item.id);
                card.className = `relative aspect-[4/5] w-full rounded-2xl overflow-hidden border border-white/10 glass shadow-lg cursor-pointer active:scale-95 transition-all ${isPurchasedSection ? 'purchased' : ''}`;
                card.innerHTML = `
                    <img src="https://loremflickr.com/400/500/food,${encodeURIComponent(nomProd)}" 
                         onerror="this.onerror=null;this.src='${DEFAULT_IMAGE}';" 
                         class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent p-2 flex flex-col justify-end">
                        <h3 class="text-[10px] font-black uppercase leading-tight text-white mb-1 line-clamp-2">${nomProd}</h3>
                        <span class="text-[8px] font-bold text-cyan-400 bg-cyan-950/50 px-1.5 py-0.5 rounded border border-cyan-500/30 w-fit">${qteProd}</span>
                    </div>`;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }

        async function togglePurchase(id) {
            const item = currentList.find(i => i.id === id);
            if (!item) return;
            item.isPurchased = !item.isPurchased;
            renderShopping();
            try {
                await fetch(`${N8N_URL}/webhook/shopping-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: item.isPurchased ? "delete" : "add", 
                        item: item.nom, 
                        email: userEmail 
                    })
                });
            } catch (e) {}
        }

        // --- ENVOI DE MESSAGE ---
        async function envoyerMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const message = input.value.trim();
            if (!message || !userEmail) return;

            chat.innerHTML += `<div class="message-user m-4 p-4 max-w-[90%] shadow-xl"><p class="text-xs text-white">${message}</p></div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch(`${N8N_URL}/webhook/chat-agent`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ message: message, email: userEmail }) 
                });
                const data = await response.json();
                const result = Array.isArray(data) ? data[0] : data;
                
                let outputText = result.output || "";
                let cmd = null;
                if (outputText.includes('[[[')) { 
                    cmd = JSON.parse(outputText.split('[[[')[1].split(']]]')[0]); 
                    outputText = outputText.split('[[[')[0].trim(); 
                }
                
                if (outputText) { 
                    chat.innerHTML += `<div class="message-agent m-4 p-4 max-w-[90%] shadow-xl border-l-4 border-cyan-500/50 bg-cyan-500/5"><p class="text-xs italic text-gray-200">${outputText}</p></div>`; 
                }
                
                const action = cmd?.action || result.action;
                const dataPayload = cmd?.data || result.data;
                if (action === "switchToShopping") {
                    let list = dataPayload;
                    if (typeof list === 'string') list = JSON.parse(list);
                    switchToShopping(list.items || list);
                }
                
                if (result.audio_base64 && result.audio_base64 !== "empty") { 
                    new Audio("data:audio/mp3;base64," + result.audio_base64).play(); 
                }
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                console.error("Erreur n8n:", e);
            }
        }
    </script>
</body>
</html>
