<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitBuddy">
    <meta name="theme-color" content="#050505">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json?v=3">
    <title>FitBuddy AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Utilisation de dvh (Dynamic Viewport Height) pour s'adapter aux barres d'adresse */
        html, body { 
            background-color: #000; 
            color: #e5e5e5; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100%;
            height: 100dvh; 
            overflow: hidden; 
        }

        /* Gestion des zones de sécurité (Notch et barres système) */
        .main-card { 
            background: #0a0a0a; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            height: 100%;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        .message-user { background: linear-gradient(135deg, #6b21a8, #4c1d95); margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .message-agent { background: #1a1a1a; margin-right: auto; border-radius: 15px 15px 15px 2px; border: 1px solid #22d3ee; }
        
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .purchased { opacity: 0.35; filter: grayscale(1); transform: scale(0.95); transition: all 0.3s ease; }
        
        .macro-ring {
            position: relative; width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(#0a0a0a 55%, transparent 56%);
        }
        .macro-value { position: absolute; font-weight: 900; font-size: 1.1rem; }
        .water-progress { height: 12px; border-radius: 6px; background: rgba(255,255,255,0.05); overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .water-bar { height: 100%; background: linear-gradient(90deg, #22d3ee, #0891b2); transition: width 1s ease-in-out; box-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="main-container" class="w-full h-full md:max-w-6xl md:h-[90vh] md:rounded-3xl main-card overflow-hidden shadow-2xl">
        <div class="flex-none p-3 border-b border-white/10 flex justify-between items-center bg-black">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-base font-bold uppercase text-cyan-400 tracking-tighter">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </div>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <div class="flex-none h-48 md:h-full md:w-1/2 bg-black relative border-b border-white/10 md:border-b-0 md:border-r">
                <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                    <source src="agent-avatar.mp4" type="video/mp4">
                </video>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden bg-black">
                <div id="chat" class="flex-1 overflow-y-auto space-y-4 p-4">
                    <div id="init-msg" class="message-agent p-4 max-w-[90%] shadow-xl">
                        <p class="text-[8px] text-cyan-400 uppercase tracking-widest mb-1 font-bold">System</p>
                        <p id="system-status" class="text-xs text-gray-300">Prêt.</p>
                    </div>
                </div>
