<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json?v=3">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=3');
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitBuddy">
    <meta name="theme-color" content="#050505">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitBuddy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
        html { height: -webkit-fill-available; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .message-user { background: linear-gradient(135deg, #6b21a8, #4c1d95); margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .message-agent { background: rgba(30, 30, 30, 0.8); margin-right: auto; border-radius: 15px 15px 15px 2px; border: 1px solid #22d3ee; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .purchased { opacity: 0.35; filter: grayscale(1); transform: scale(0.95); transition: all 0.3s ease; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: rgba(239, 68, 68, 0.3) !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="main-container" class="w-full max-w-6xl h-full md:h-[90vh] md:rounded-3xl glass overflow-hidden flex flex-col shadow-2xl">
        <div class="flex-none p-3 border-b border-white/10 flex justify-between items-center bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-base font-bold uppercase text-cyan-400">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </div>

        <div class="flex-1 flex flex-col landscape:flex-row md:flex-row overflow-hidden">
            <div class="flex-none h-40 landscape:h-full landscape:w-1/3 md:h-full md:w-1/2 bg-black relative border-b border-white/10">
                <div class="video-container">
                    <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                        <source src="agent-avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden bg-gradient-to-b from-white/[0.02] to-transparent">
                <div id="chat" class="flex-1 overflow-y-auto space-y-4 relative">
                    <div class="message-agent m-4 p-4 max-w-[90%] shadow-xl">
                        <p id="system-status" class="text-xs">Initialisation...</p>
                    </div>
                </div>

                <div class="flex-none p-3 bg-black/40 border-t border-white/5">
                    <div class="relative flex items-center gap-2">
                        <button id="micBtn" onclick="toggleMic()" class="flex-none w-12 h-12 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center transition-all">
                            <i id="micIcon" data-lucide="mic" class="w-5 h-5 text-cyan-400"></i>
                        </button>
                        <div class="relative flex-1">
                            <input type="text" id="userInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none text-sm" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
                            <button onclick="envoyerMessage()" class="absolute right-2 top-2 bottom-2 px-3 bg-cyan-600 rounded-lg shadow-lg">
                                <i data-lucide="send-horizontal" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => { lucide.createIcons(); checkAuth(); });

        let userEmail = localStorage.getItem('fitbuddy_email');
        const N8N_URL = "https://greedily-submarine-prance.ngrok-free.dev";
        const DEFAULT_IMAGE = "default-item.svg";
        const RAYONS = ["Boulangerie & Viennoiserie", "Fruits & Légumes frais", "Boucherie & Volaille", "Poissonnerie", "Pâtes Riz & féculents", "Conserves de Légumes & Plats Cuisinés", "Conserves de Poisson", "Huiles Vinaigres Epices & Sauces", "Apéritif", "Petit-déjeuner", "Biscuits & Gâteaux", "Confiserie & Chocolat", "Confitures Miels & Pâtes à tartiner", "Aide à la pâtisserie", "Lait & Oeufs", "Produits laitiers", "Surgelés", "Boissons", "Hygiène", "Entretien de la maison", "Animalerie", "Loisirs", "Autres"];

        let isListening = false;
        let currentList = [];

        function checkAuth() {
            if (!userEmail) {
                userEmail = prompt("E-mail :");
                if (userEmail && userEmail.includes("@")) { localStorage.setItem('fitbuddy_email', userEmail); }
                else { location.reload(); }
            }
            document.getElementById('system-status').innerText = `Connecté en tant que : ${userEmail}`;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('mic-active');
                document.getElementById('micIcon').classList.replace('text-cyan-400', 'text-red-500');
            };
            recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; setTimeout(envoyerMessage, 400); };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('mic-active');
                document.getElementById('micIcon').classList.replace('text-red-500', 'text-cyan-400');
            };
            recognition.onerror = () => { recognition.stop(); };
        }

        function toggleMic() { if (!recognition) return; if (!isListening) recognition.start(); else recognition.stop(); }

        // --- MOTEUR DE RENDU ULTRA-ROBUSTE ---
        function switchToShopping(rawData) {
            console.log("Données reçues pour le rendu :", rawData);
            let itemsArray = [];

            // Extraction du tableau
            if (Array.isArray(rawData)) { itemsArray = rawData; }
            else if (rawData && typeof rawData === 'object') {
                itemsArray = rawData.items || rawData.data || (rawData.nom ? [rawData] : []);
            }

            // Reconstruction forcée pour éviter les pertes
            currentList = itemsArray.map((item, index) => {
                return {
                    uniqueId: `item-${index}-${Date.now()}`,
                    notionId: item.id || item.pageId || index,
                    nom: item.nom || item.item || "Produit",
                    quantite: item.quantite || item.quantity || "1",
                    unite: item.unite || item.unit || "",
                    rayon: item.rayon || item.category || "Autres",
                    isPurchased: false
                };
            });

            console.log("Liste reconstruite :", currentList);
            renderShopping();
        }

        function renderShopping(filterRayonName = "Tous les rayons") {
            const chat = document.getElementById('chat');
            chat.innerHTML = `
                <div class="sticky top-0 left-0 w-full bg-[#050505] border-b border-white/10 z-[60] shadow-2xl">
                    <div class="p-3 overflow-x-auto no-scrollbar flex gap-2 backdrop-blur-md bg-black/40">
                        <button onclick="renderShopping('Tous les rayons')" class="rayon-btn whitespace-nowrap px-4 py-1.5 rounded-full border ${filterRayonName === 'Tous les rayons' ? 'bg-cyan-500 text-black border-cyan-500' : 'border-cyan-500/30'} text-[9px] font-black uppercase">Tous</button>
                        ${RAYONS.map(r => `<button onclick="renderShopping('${r}')" class="rayon-btn whitespace-nowrap px-4 py-1.5 rounded-full border ${filterRayonName === r ? 'bg-cyan-500 text-black border-cyan-500' : 'border-cyan-500/30'} text-[9px] font-black uppercase">${r}</button>`).join('')}
                    </div>
                </div>
                <div id="shopping-content" class="p-4 pb-24 space-y-8"></div>
            `;
            
            const content = document.getElementById('shopping-content');
            
            if (filterRayonName === "Tous les rayons") {
                RAYONS.forEach(r => {
                    const rItems = currentList.filter(i => i.rayon === r && !i.isPurchased);
                    if (rItems.length > 0) appendCategory(content, r, rItems);
                });
            } else {
                const rItems = currentList.filter(i => i.rayon === filterRayonName && !i.isPurchased);
                appendCategory(content, filterRayonName, rItems);
            }

            const purchased = currentList.filter(i => i.isPurchased);
            if (purchased.length > 0) appendCategory(content, "PANIER", purchased, true);
        }

        function appendCategory(container, title, items, isPurchasedSection = false) {
            const section = document.createElement('div');
            section.innerHTML = `<h2 class="text-[10px] font-black text-cyan-400/50 uppercase mb-4 pl-1 border-l-2 border-cyan-400/30">${title}</h2><div class="grid grid-cols-3 gap-2"></div>`;
            const grid = section.querySelector('.grid');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.onclick = () => togglePurchase(item.uniqueId);
                card.className = `relative aspect-[4/5] rounded-xl overflow-hidden border border-white/10 glass transition-all ${isPurchasedSection ? 'purchased' : ''}`;
                
                // Sécurisation de l'image : on nettoie le nom pour l'URL
                const cleanName = encodeURIComponent(item.nom.replace(/['"]/g, ""));
                const imgUrl = `https://loremflickr.com/400/500/food,${cleanName}`;

                card.innerHTML = `
                    <img src="${imgUrl}" 
                         class="absolute inset-0 w-full h-full object-cover opacity-50" 
                         onerror="this.onerror=null; this.src='${DEFAULT_IMAGE}'; this.style.opacity='0.2';">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent p-2 flex flex-col justify-end">
                        <h3 class="text-[9px] font-black uppercase text-white line-clamp-2">${item.nom}</h3>
                        <span class="text-[8px] text-cyan-400 font-bold">${item.quantite} ${item.unite}</span>
                    </div>`;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }

        async function togglePurchase(uniqueId) {
            const item = currentList.find(i => i.uniqueId === uniqueId);
            if (!item) return;
            item.isPurchased = !item.isPurchased;
            renderShopping();
            try {
                await fetch(`${N8N_URL}/webhook/shopping-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: item.isPurchased ? "delete" : "add", pageId: item.notionId, item: item.nom, email: userEmail })
                });
            } catch (e) {}
        }

        async function envoyerMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            document.getElementById('chat').innerHTML += `<div class="message-user m-4 p-4 max-w-[90%]"><p class="text-xs text-white">${message}</p></div>`;
            input.value = '';
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

            try {
                const response = await fetch(`${N8N_URL}/webhook/chat-agent`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ message: message, email: userEmail }) 
                });
                const responseData = await response.json();
                const result = Array.isArray(responseData) ? responseData[0] : responseData;
                
                let outputText = result.output || "";
                let payload = result.data;
                if (typeof payload === 'string') { try { payload = JSON.parse(payload); } catch(e) {} }

                // Si l'IA a mis l'action DANS le payload
                const action = (payload && payload.action) ? payload.action : result.action;

                if (outputText) { 
                    document.getElementById('chat').innerHTML += `<div class="message-agent m-4 p-4 max-w-[90%] bg-cyan-500/5"><p class="text-xs text-gray-200">${outputText}</p></div>`; 
                }
                
                if (action === "switchToShopping" || (payload && payload.items)) {
                    switchToShopping(payload);
                }
                
                if (result.audio_base64 && result.audio_base64 !== "empty") { 
                    new Audio("data:audio/mp3;base64," + result.audio_base64).play(); 
                }
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            } catch (e) { console.error("Erreur réseau :", e); }
        }
    </script>
</body>
</html>
