<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json?v=3">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=3');
        }
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitBuddy">
    <meta name="theme-color" content="#050505">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitBuddy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; height: -webkit-fill-available; overflow: hidden; }
        html { height: -webkit-fill-available; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .message-user { background: linear-gradient(135deg, #6b21a8, #4c1d95); margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .message-agent { background: rgba(30, 30, 30, 0.8); margin-right: auto; border-radius: 15px 15px 15px 2px; border: 1px solid #22d3ee; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .purchased { opacity: 0.35; filter: grayscale(1); transform: scale(0.95); transition: all 0.3s ease; }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-red 1.5s infinite; background-color: rgba(239, 68, 68, 0.2) !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="main-container" class="w-full max-w-6xl h-full md:h-[90vh] md:rounded-3xl glass overflow-hidden flex flex-col shadow-2xl">
        <div class="flex-none p-3 md:p-4 border-b border-white/10 flex justify-between items-center bg-black/20">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h1 class="text-base md:text-lg font-bold tracking-tighter uppercase text-cyan-400">FitBuddy</h1>
            </div>
            <i data-lucide="dumbbell" class="text-purple-500 w-5 h-5"></i>
        </div>

        <div class="flex-1 flex flex-col landscape:flex-row md:flex-row overflow-hidden">
            <div class="flex-none h-40 landscape:h-full landscape:w-1/3 md:h-full md:w-1/2 bg-black relative border-b border-white/10">
                <div class="video-container">
                    <video id="agentVideo" class="w-full h-full object-contain" autoplay loop muted playsinline>
                        <source src="agent-avatar.mp4" type="video/mp4">
                    </video>
                </div>
            </div>

            <div class="flex-1 flex flex-col overflow-hidden bg-gradient-to-b from-white/[0.02] to-transparent">
                <div id="chat" class="flex-1 overflow-y-auto space-y-4 relative">
                    <div class="message-agent m-4 p-4 max-w-[90%] shadow-xl">
                        <p class="text-[8px] text-cyan-400 uppercase tracking-widest mb-1 font-bold">System</p>
                        <p id="system-status" class="text-xs">Chargement de la liste...</p>
                    </div>
                </div>

                <div class="flex-none p-3 md:p-4 bg-black/40 border-t border-white/5">
                    <div class="relative flex items-center gap-2">
                        <button id="micBtn" onclick="toggleMic()" class="relative z-50 flex-none w-12 h-12 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center transition-all group">
                            <i id="micIcon" data-lucide="mic" class="w-5 h-5 text-cyan-400"></i>
                        </button>
                        <div class="relative flex-1">
                            <input type="text" id="userInput" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 md:p-4 pr-14 focus:outline-none focus:border-cyan-500/50 text-sm" placeholder="Message..." onkeypress="if(event.key === 'Enter') envoyerMessage()">
                            <button onclick="envoyerMessage()" class="absolute right-2 top-2 bottom-2 px-3 bg-cyan-600 rounded-lg shadow-lg">
                                <i data-lucide="send-horizontal" class="w-4 h-4 text-white"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => { 
            lucide.createIcons();
            checkAuth(); 
        });

        let userEmail = localStorage.getItem('fitbuddy_email');
        const N8N_URL = "https://greedily-submarine-prance.ngrok-free.dev";
        const DEFAULT_IMAGE = "default-item.svg";

        let currentList = [];
        let isListening = false;

        function checkAuth() {
            if (!userEmail) {
                userEmail = prompt("Veuillez entrer votre e-mail :");
                if (userEmail && userEmail.includes("@")) {
                    localStorage.setItem('fitbuddy_email', userEmail);
                } else {
                    location.reload();
                }
            }
            document.getElementById('system-status').innerText = `Connecté : ${userEmail}`;
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('mic-active');
                document.getElementById('micIcon').classList.replace('text-cyan-400', 'text-red-500');
            };
            recognition.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                setTimeout(envoyerMessage, 400);
            };
            recognition.onend = () => stopMicVisuals();
            recognition.onerror = () => stopMicVisuals();
        }

        function toggleMic() {
            if (!recognition) return;
            if (!isListening) recognition.start();
            else recognition.stop();
        }

        function stopMicVisuals() {
            isListening = false;
            document.getElementById('micBtn').classList.remove('mic-active');
            const icon = document.getElementById('micIcon');
            icon.classList.remove('text-red-500');
            icon.classList.add('text-cyan-400');
        }

        function switchToShopping(data) {
            let itemsArray = [];
            if (data && data.items) {
                itemsArray = Array.isArray(data.items) ? data.items : Object.values(data.items);
            } else if (Array.isArray(data)) {
                itemsArray = data;
            } else if (data && typeof data === 'object') {
                itemsArray = Object.values(data);
            }

            currentList = itemsArray.map((i, idx) => ({
                id: i.id || i.pageId || `idx-${idx}-${Date.now()}`,
                nom: (i.nom || i.item || "Produit").trim(),
                quantite: i.quantite || i.quantity || "1",
                unite: i.unite || i.unit || "",
                rayon: (i.rayon || i.category || "Autres").trim(),
                isPurchased: false
            }));
            
            renderShopping();
        }

        function renderShopping(filterRayonName = "Tous les rayons") {
            const chat = document.getElementById('chat');
            const rayonsReels = [...new Set(currentList.map(i => i.rayon))].sort();
            const boutonsRayons = ["Tous les rayons", ...rayonsReels];

            chat.innerHTML = `
                <div class="sticky top-0 left-0 w-full bg-[#050505] border-b border-white/10 z-[60] shadow-2xl">
                    <div class="p-3 overflow-x-auto no-scrollbar flex gap-2 backdrop-blur-md bg-black/40">
                        ${boutonsRayons.map(r => {
                            // Sécurisation du nom pour l'attribut onclick
                            const safeName = r.replace(/'/g, "\\'");
                            return `
                                <button onclick="renderShopping('${safeName}')" 
                                        class="rayon-btn whitespace-nowrap px-4 py-1.5 rounded-full border 
                                        ${filterRayonName === r ? 'bg-cyan-500 text-black border-cyan-500' : 'border-cyan-500/30'} 
                                        text-[9px] font-black uppercase max-w-[140px] overflow-hidden text-ellipsis">
                                    ${r}
                                </button>`;
                        }).join('')}
                    </div>
                </div>
                <div id="shopping-content" class="p-4 pb-24 space-y-8"></div>
            `;
            
            const content = document.getElementById('shopping-content');
            const targetRayons = filterRayonName === "Tous les rayons" ? rayonsReels : [filterRayonName];

            targetRayons.forEach(r => {
                const rItems = currentList.filter(i => i.rayon === r && !i.isPurchased);
                if (rItems.length > 0) appendCategory(content, r, rItems);
            });

            const purchased = currentList.filter(i => i.isPurchased);
            if (purchased.length > 0 && filterRayonName === "Tous les rayons") {
                appendCategory(content, "PANIER", purchased, true);
            }
        }

        function appendCategory(container, title, items, isPurchasedSection = false) {
            const section = document.createElement('div');
            section.innerHTML = `<h2 class="text-[10px] font-black text-cyan-400/50 uppercase mb-4 pl-1 border-l-2 border-cyan-400/30">${title}</h2><div class="grid grid-cols-3 gap-2 md:gap-4"></div>`;
            const grid = section.querySelector('.grid');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.onclick = () => togglePurchase(item.id);
                card.className = `relative aspect-[4/5] rounded-xl overflow-hidden border border-white/10 glass ${isPurchasedSection ? 'purchased' : ''}`;
                
                const imgName = encodeURIComponent(item.nom);
                
                card.innerHTML = `
                    <img src="https://loremflickr.com/400/500/food,${imgName}" 
                         class="absolute inset-0 w-full h-full object-cover opacity-50" 
                         onerror="this.onerror=null;this.src='${DEFAULT_IMAGE}';">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent p-2 flex flex-col justify-end">
                        <h3 class="text-[9px] font-black uppercase text-white line-clamp-2">${item.nom}</h3>
                        <span class="text-[8px] text-cyan-400 font-bold">${item.quantite} ${item.unite}</span>
                    </div>`;
                grid.appendChild(card);
            });
            container.appendChild(section);
        }

        async function togglePurchase(id) {
            const item = currentList.find(i => i.id === id);
            if (!item) return;
            item.isPurchased = !item.isPurchased;
            renderShopping();
            try {
                await fetch(`${N8N_URL}/webhook/shopping-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: item.isPurchased ? "delete" : "add", pageId: item.id, item: item.nom, email: userEmail })
                });
            } catch (e) {}
        }

        async function envoyerMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || !userEmail) return;
            
            document.getElementById('chat').innerHTML += `<div class="message-user m-4 p-4 max-w-[90%]"><p class="text-xs text-white">${message}</p></div>`;
            input.value = '';
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;

            try {
                const response = await fetch(`${N8N_URL}/webhook/chat-agent`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ message: message, email: userEmail }) 
                });
                const responseData = await response.json();
                const result = Array.isArray(responseData) ? responseData[0] : responseData;
                
                let outputText = result.output || "";
                let action = result.action;
                let dataPayload = result.data;

                if (typeof dataPayload === 'string') {
                    try { dataPayload = JSON.parse(dataPayload); } catch(e) {}
                }

                if (dataPayload && dataPayload.action) {
                    action = dataPayload.action;
                }

                if (outputText) { 
                    document.getElementById('chat').innerHTML += `<div class="message-agent m-4 p-4 max-w-[90%] bg-cyan-500/5"><p class="text-xs text-gray-200">${outputText}</p></div>`; 
                }
                
                if (action === "switchToShopping") {
                    switchToShopping(dataPayload);
                }
                
                if (result.audio_base64 && result.audio_base64 !== "empty") { 
                    new Audio("data:audio/mp3;base64," + result.audio_base64).play(); 
                }
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            } catch (e) {
                console.error("Erreur n8n:", e);
            }
        }
    </script>
</body>
</html>
